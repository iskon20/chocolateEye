<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../imgs/logo.png" type="image/x-icon" />

    <title>Админ панель | Chocolate Eye</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 6px;
      }
      th {
        background: #222;
        color: #fff;
      }
      button {
        margin: 2px;
      }

      /* Модалка */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: #1a1a1a;
        border: 1px solid #444;
        border-radius: 10px;
        padding: 24px;
        min-width: 340px;
        max-width: 500px;
        width: 100%;
        color: #fff;
      }
      .modal h3 {
        margin: 0 0 16px;
      }
      .modal label {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
        color: #aaa;
      }
      .modal input[type="text"],
      .modal input[type="number"] {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 14px;
        padding: 8px 10px;
        background: #2a2a2a;
        border: 1px solid #555;
        border-radius: 6px;
        color: #fff;
      }
      .session-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 10px;
      }
      .session-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .session-item input {
        flex: 1;
        padding: 6px 10px;
        background: #2a2a2a;
        border: 1px solid #555;
        border-radius: 6px;
        color: #fff;
      }
      .session-item button {
        background: #550000;
        border: none;
        border-radius: 4px;
        color: #fff;
        cursor: pointer;
        padding: 6px 10px;
      }
      .modal-actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
        justify-content: flex-end;
      }

      /* Модалка подтверждения */
      .confirm-modal {
        max-width: 380px;
        text-align: center;
      }
      .confirm-modal p {
        margin: 0 0 20px;
        color: #ddd;
        font-size: 15px;
      }
      .confirm-modal .modal-actions {
        justify-content: center;
      }
      .btn-danger {
        background: #7a1414;
        border: none;
        border-radius: 6px;
        color: #fff;
        cursor: pointer;
        padding: 8px 16px;
      }
      .btn-secondary {
        background: #333;
        border: 1px solid #555;
        border-radius: 6px;
        color: #fff;
        cursor: pointer;
        padding: 8px 16px;
      }

      @media screen and (max-width: 1024px) {
        .responsive-table thead {
          display: none;
        }

        .logo {
          width: 40%;
        }

        button,
        input,
        select,
        label {
          padding: 12px 20px !important;
        }

        .responsive-table tr {
          display: block;
          margin-bottom: 10px;
          border: 1px solid #ccc;
          border-radius: 6px;
          padding: 6px;
        }

        .responsive-table td {
          display: flex;
          justify-content: space-between;
          border: none;
          border-bottom: 1px solid #222;
          padding: 6px 10px;
        }

        .responsive-table td::before {
          content: attr(data-label);
          font-weight: 600;
          color: #555;
        }

        .responsive-table td:last-child {
          border-bottom: none;
        }
      }
    </style>
  </head>
  <body>
    <h1>⚙️ Админ панель</h1>

    <button style="width: max-content" onclick="location.href = 'main.html'">
      Назад
    </button>

    <section>
      <h2>👥 Пользователи</h2>
      <table class="responsive-table" id="users">
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Имя</th>
            <th>Session IDs</th>
            <th>Приоритет</th>
            <th>Чужие</th>
            <th>Создан</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section>
      <h2>📧 Whitelist</h2>
      <input id="emailAdd" placeholder="Email" />
      <button onclick="addWhite()">Добавить</button>
      <table class="responsive-table" id="whitelist">
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>скрыть</th>
            <th>удалить</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Модалка редактирования пользователя -->
    <div class="modal-overlay" id="editModal">
      <div class="modal">
        <h3>✏️ Редактировать пользователя</h3>

        <label>Имя (user_name)</label>
        <input type="text" id="editUserName" placeholder="Введите имя" />

        <label>Приоритет</label>
        <input type="number" id="editPriority" placeholder="0" step="1" />

        <label>Session IDs</label>
        <div class="session-list" id="sessionList"></div>
        <button onclick="addSessionField()">+ Добавить session_id</button>

        <div class="modal-actions">
          <button onclick="closeModal()">Отмена</button>
          <button onclick="saveUser()">💾 Сохранить</button>
        </div>
      </div>
    </div>

    <!-- Модалка подтверждения удаления -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal confirm-modal">
        <h3>🗑 Удалить пользователя?</h3>
        <p id="confirmText">Это действие нельзя отменить.</p>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeConfirm()">Отмена</button>
          <button class="btn-danger" onclick="confirmDelete()">Удалить</button>
        </div>
      </div>
    </div>

    <script src="../config.js"></script>
    <script>
      const API = window.API_URL;
      const token = localStorage.getItem("session");
      let editingUserId = null;
      let pendingDeleteId = null;

      async function loadUsers() {
        const res = await fetch(`${API}/admin/users`, {
          headers: { "x-session": token },
        });
        const data = await res.json();

        const tbody = document.querySelector("#users tbody");
        tbody.innerHTML = "";

        data.forEach((u) => {
          const sessions = (u.session_ids || []).join(", ") || "—";
          const tr = document.createElement("tr");

          const editBtn = document.createElement("button");
          editBtn.textContent = "✏️";
          editBtn.dataset.userId = u.id;
          editBtn.dataset.userName = u.user_name || "";
          editBtn.dataset.priority = u.priority ?? 0;
          editBtn.dataset.sessionIds = JSON.stringify(u.session_ids || []);
          editBtn.addEventListener("click", () => {
            openModal(
              parseInt(editBtn.dataset.userId),
              editBtn.dataset.userName,
              parseInt(editBtn.dataset.priority) || 0,
              JSON.parse(editBtn.dataset.sessionIds),
            );
          });

          tr.innerHTML = `
            <td class="copyable" data-label="ID">${u.id}</td>
            <td class="copyable" data-label="Email">${u.email}</td>
            <td data-label="Имя">${u.user_name || "—"}</td>
            <td data-label="Session IDs" style="font-size:12px;word-break:break-all">${sessions}</td>
            <td data-label="Приоритет">${u.priority ?? 0}</td>
            <td data-label="Чужие">
              <input type="checkbox" ${u.can_mark_others ? "checked" : ""}
                onchange="toggleCanMark(${u.id}, this.checked)">
            </td>
            <td data-label="Создан">${u.created_at}</td>
            <td data-label="Действие">
              <div id="actions-${u.id}">
                <button onclick="askDelUser(${u.id}, '${(u.email || "").replace(/'/g, "\\'")}')">🗑</button>
                <button onclick="location.href='marks.html?user=${u.id}'">📝 Отмеченные</button>
              </div>
            </td>
          `;

          tr.querySelector(`#actions-${u.id}`).prepend(editBtn);
          tbody.appendChild(tr);
        });
      }

      async function toggleCanMark(id, enabled) {
        await fetch(`${API}/admin/users/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json", "x-session": token },
          body: JSON.stringify({ can_mark_others: enabled }),
        });
      }

      function openModal(userId, userName, priority, sessionIds) {
        editingUserId = userId;
        document.getElementById("editUserName").value = userName;
        document.getElementById("editPriority").value = priority;

        const list = document.getElementById("sessionList");
        list.innerHTML = "";
        (sessionIds.length ? sessionIds : [""]).forEach((s) =>
          addSessionField(s),
        );

        document.getElementById("editModal").classList.add("open");
      }

      function closeModal() {
        document.getElementById("editModal").classList.remove("open");
        editingUserId = null;
      }

      function addSessionField(value = "") {
        const list = document.getElementById("sessionList");
        const div = document.createElement("div");
        div.className = "session-item";
        div.innerHTML = `
          <input type="text" placeholder="session_id" value="${value}" />
          <button onclick="this.parentElement.remove()">✕</button>
        `;
        list.appendChild(div);
      }

      async function saveUser() {
        const user_name = document.getElementById("editUserName").value.trim();
        const priorityRaw = document.getElementById("editPriority").value.trim();
        const priority = priorityRaw === "" ? 0 : parseInt(priorityRaw, 10) || 0;
        const inputs = document.querySelectorAll(
          "#sessionList .session-item input",
        );
        const session_ids = Array.from(inputs)
          .map((i) => i.value.trim())
          .filter(Boolean);

        await fetch(`${API}/admin/users/${editingUserId}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "x-session": token,
          },
          body: JSON.stringify({ user_name, priority, session_ids }),
        });

        closeModal();
        loadUsers();
      }

      // ── Удаление с локальным подтверждением ──
      function askDelUser(id, email) {
        pendingDeleteId = id;
        document.getElementById("confirmText").textContent = email
          ? `Пользователь «${email}» будет удалён без возможности восстановления.`
          : "Это действие нельзя отменить.";
        document.getElementById("confirmModal").classList.add("open");
      }

      function closeConfirm() {
        document.getElementById("confirmModal").classList.remove("open");
        pendingDeleteId = null;
      }

      async function confirmDelete() {
        if (pendingDeleteId == null) return;
        const id = pendingDeleteId;
        closeConfirm();
        await fetch(`${API}/admin/users/${id}`, {
          method: "DELETE",
          headers: { "x-session": token },
        });
        loadUsers();
      }

      async function loadWhitelist() {
        const res = await fetch(`${API}/admin/whitelist`, {
          headers: { "x-session": token },
        });

        const data = await res.json();
        const tbody = document.querySelector("#whitelist tbody");
        tbody.innerHTML = "";

        data.forEach((w) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${w.id}</td>
            <td>${w.email}</td>
            <td>
              <input type="checkbox" ${w.hidden_mode ? "checked" : ""} onchange="toggleHidden(${w.id}, this.checked)">
            </td>
            <td><button onclick="delWhite(${w.id})">🗑</button></td>
          `;
          tbody.appendChild(tr);
        });
      }

      async function toggleHidden(id, enabled) {
        await fetch(`${API}/admin/whitelist/${id}/hidden`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session": token },
          body: JSON.stringify({ hidden: enabled }),
        });
      }

      async function addWhite() {
        const email = document.getElementById("emailAdd").value.trim();
        if (!email) return alert("Введите email");
        await fetch(`${API}/admin/whitelist`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session": token },
          body: JSON.stringify({ email }),
        });
        loadWhitelist();
      }

      async function delWhite(id) {
        await fetch(`${API}/admin/whitelist/${id}`, {
          method: "DELETE",
          headers: { "x-session": token },
        });
        loadWhitelist();
      }

      // Закрытие модалок по клику на фон
      document.getElementById("editModal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeModal();
      });
      document.getElementById("confirmModal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeConfirm();
      });

      loadUsers();
      loadWhitelist();
    </script>
  </body>
</html>
