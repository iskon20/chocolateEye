<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="../imgs/logo.png" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Список ID | Chocolate Eye</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-box">
        <p id="modal-message"></p>
        <div class="modal-buttons" id="modal-buttons"></div>
      </div>
    </div>

    <video class="bg-video" muted loop playsinline id="bgVideo">
      <source
        src="https://cdn.iskonentertainment.it.com/sdvg.mp4"
        type="video/mp4"
      />
    </video>

    <div id="unlog">logout</div>
    <button class="usernames" onclick="location.href = 'usernames.html'">
      Юзеры
    </button>

    <div class="toolbar">
      <img
        class="logo userSelect"
        draggable="false"
        width="20%"
        src="../imgs/logo.png"
        alt=""
      />

      <div>
        <select id="sort">
          <option value="mixed">Последние добавленные ID ↑</option>
          <option value="recent">Последние добавленные</option>
          <option value="id_asc">ID ↑</option>
          <option value="id_desc">ID ↓</option>
        </select>

        <select id="id_length">
          <option value="">Все ID</option>
          <option value="3">3-значные</option>
          <option value="4">4-значные</option>
          <option value="5">5-значные</option>
          <option value="6">6-значные</option>
          <option value="7">7-значные</option>
        </select>

        <select id="country">
          <option value="">Страна</option>
          <option value="uz">Узбекистан</option>
          <option value="kz">Казахстан</option>
          <option value="ua">Украина</option>
          <option value="ru">Россия</option>
          <option value="tr">Турция</option>
        </select>

        <label class="status_hidden hidden"
          ><input type="checkbox" id="has_phone" /> Только с номером</label
        >
        <label class="status_hidden hidden"
          ><input type="checkbox" id="on_sale" /> Только на продаже</label
        >
        <label class="status_hidden hidden"
          ><input type="checkbox" id="not_recently" /> Только не RECENTLY</label
        >

        <button id="refresh">🔄 Обновить</button>
        <button onclick="location.href = 'profile.html'">Сохраненные</button>

        <button
          id="adminBtn"
          class="hidden"
          onclick="location.href = 'admin.html'"
        >
          ⚙️ Админ-панель
        </button>

        <div id="total-count" class="count-display">
          Загрузка кол-ва записей...
        </div>
      </div>
    </div>

    <table id="list" class="responsive-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Имя</th>
          <th>Юзер</th>
          <th>Чат</th>
          <th class="hidden status_hidden">Статус</th>
          <th class="hidden status_hidden">Телефон</th>
          <th>Страна</th>
          <th>Добавлен</th>
          <th>Спарсил</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="toolbar">
      <button id="prev">← Назад</button>
      <span id="pageinfo"></span>
      <button id="next">Вперёд →</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

    <script src="../config.js"></script>
    <script src="../js/video.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
