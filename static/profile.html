<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="../imgs/logo.png" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мои отметки | Chocolate Eye</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .marker-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 3px;
      }

      .marker-dropdown.show {
        display: block;
      }
      .marker-option {
        padding: 6px 10px;
        cursor: pointer;
        border-radius: 4px;
        white-space: nowrap;
      }
      .marker-option:hover {
        background: #7b7b7b;
      }
      .marker-option.active {
        font-weight: bold;
        text-decoration: underline;
      }

      .marker-option.active::after {
        content: " ✓";
      }

      .marker-toggle-btn {
        border: none;
        background: #353535;
        border-radius: 4px;
        cursor: pointer;
        padding: 2px 6px;
      }

      button.action {
        white-space: nowrap;
        margin: 0 3px;
        padding: 4px 8px;
        padding: 1vw 2vw;
        border-radius: 6px;
        cursor: pointer;
        border: none;
        font-size: 13px;
      }

      button.return {
        color: white;
        background: #4caf50;
      }
      button.delete {
        background: #f15757;
        color: white;
      }
    </style>
  </head>

  <body>
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-box">
        <p id="modal-message"></p>
        <div class="modal-buttons" id="modal-buttons"></div>
      </div>
    </div>

    <div class="header">
      <img class="logo" width="20%" src="../imgs/logo.png" alt="" />
      <h2>Мои отмеченные ID</h2>
      <button onclick="back()">Назад</button>
    </div>

    <div class="sort-bar">
      <p>Сортировать по маркеру:</p>

      <div class="sort-dropdown-wrapper">
        <button
          class="sort-dropdown-btn"
          onclick="this.nextElementSibling.classList.toggle('show')"
        >
          <span id="sort-current-label">Без сортировки</span>▾
        </button>
        <div class="sort-dropdown" id="sort-dropdown"></div>
      </div>
    </div>

    <table id="list" class="responsive-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Имя</th>
          <th>Юзер</th>
          <th>Чат</th>
          <th class="status_hidden hidden">Статус</th>
          <th class="status_hidden hidden">Телефон</th>
          <th>Страна</th>
          <th>Добавлен</th>
          <th>Кто спарсил</th>
          <th>Действия</th>
          <th>Маркеры</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

    <script src="../config.js"></script>
    <script>
      // const API = "https://api.iskonentertainment.it.com/api";
      // const API = "http://127.0.0.1:3000/api";
      const API = window.API_URL;
      const token = localStorage.getItem("session");
      let MARKERS_CACHE = null;
      let ALL_DATA = [];

      // ===== Модальное окно =====
      function showModal(message, buttons) {
        const overlay = document.getElementById("modal-overlay");
        const msgEl = document.getElementById("modal-message");
        const btnContainer = document.getElementById("modal-buttons");

        msgEl.textContent = message;
        btnContainer.innerHTML = "";

        buttons.forEach((b) => {
          const btn = document.createElement("button");
          btn.textContent = b.label;
          btn.className = b.className || "modal-btn-ok";
          btn.onclick = () => {
            overlay.classList.add("hidden");
            b.onClick?.();
          };
          btnContainer.appendChild(btn);
        });

        overlay.classList.remove("hidden");
      }

      function showAlert(message) {
        showModal(message, [{ label: "Ок", className: "modal-btn-ok" }]);
      }

      function showConfirm(message, onConfirm) {
        showModal(message, [
          { label: "Отмена", className: "modal-btn-cancel" },
          {
            label: "Подтвердить",
            className: "modal-btn-danger",
            onClick: onConfirm,
          },
        ]);
      }

      function countryFlag(code) {
        if (!code) return "";
        code = code.trim().toLowerCase();
        const flagPath = `../imgs/flags/${code}.png`;
        return `<img src="${flagPath}" alt="${code.toUpperCase()}" width="24" height="16" style="vertical-align:middle;">`;
      }

      document.addEventListener("click", async (e) => {
        const el = e.target.closest(".copyable");
        if (!el) return;

        let text = el.innerText.trim();

        if (el.getAttribute("data-label") === "ID") {
          text = text.replace(/\s|&nbsp;/g, "").replace(/\u00A0/g, "");
        }

        try {
          await navigator.clipboard.writeText(text);
          el.classList.add("copied");
          setTimeout(() => el.classList.remove("copied"), 1000);
        } catch (err) {
          console.warn("Ошибка копирования:", err);
        }
      });

      document.addEventListener("click", (e) => {
        if (!e.target.closest(".markers-cell")) {
          document
            .querySelectorAll(".marker-dropdown.show")
            .forEach((d) => d.classList.remove("show"));
        }
        if (!e.target.closest(".sort-dropdown-wrapper")) {
          document
            .querySelectorAll(".sort-dropdown.show")
            .forEach((d) => d.classList.remove("show"));
        }
      });

      const loader = document.createElement("div");
      loader.id = "loader";
      loader.classList.add("loader");
      loader.style.width = "120px";
      loader.style.margin = "30px auto";

      // ===== Маркеры =====
      let currentSortMarker = "";

      function fillSortOptions() {
        const dropdown = document.getElementById("sort-dropdown");

        const noneOption = `
    <div class="sort-option ${currentSortMarker === "" ? "active" : ""}"
         onclick="selectSortMarker('', 'Без сортировки')">
      Без сортировки
    </div>
  `;

        const markerOptions = Object.entries(MARKERS_CACHE)
          .map(([key, m]) => {
            const active = currentSortMarker === key;
            return `
        <div class="sort-option ${active ? "active" : ""}"
             onclick="selectSortMarker('${key}', '${m.label}')">
          <span class="marker-dot" style="background:${m.color}"></span>
          ${m.label}
        </div>
      `;
          })
          .join("");

        dropdown.innerHTML = noneOption + markerOptions;
      }

      function selectSortMarker(key, label) {
        currentSortMarker = key;
        document.getElementById("sort-current-label").textContent = label;
        document.getElementById("sort-dropdown").classList.remove("show");
        fillSortOptions();
        sortLocally();
      }

      function markerBadges(markers = []) {
        if (!markers.length) return "";
        return markers
          .map(
            (m) =>
              `<span class="marker-dot" data-marker="${m}" style="background:${MARKERS_CACHE[m]?.color}" title="${MARKERS_CACHE[m]?.label}"></span>`,
          )
          .join("");
      }

      function applyCardStyle(tr, markers = []) {
        const allTds = tr.querySelectorAll("td");
        const firstTd = allTds[0];

        if (!markers.length) {
          tr.style.boxShadow = "";
          tr.style.borderLeft = "";
          tr.style.removeProperty("--marker-total-width");
          tr.classList.remove("has-markers");
          if (firstTd) firstTd.style.paddingLeft = "";
          return;
        }

        tr.style.borderLeft = "none";

        const barWidth = 5;

        const shadows = markers
          .map((m, i) => {
            const color = MARKERS_CACHE[m]?.color || "#ccc";
            const offset = barWidth * (i + 1);
            return `inset ${offset}px 0 0 ${color}`;
          })
          .join(", ");

        tr.style.boxShadow = shadows;
        tr.classList.add("has-markers");

        const totalWidth = barWidth * markers.length + 8;
        tr.style.setProperty("--marker-total-width", `${totalWidth}px`);

        if (firstTd) firstTd.style.paddingLeft = `${totalWidth}px`;
      }
      function markerDropdown(id, activeMarkers = []) {
        const options = Object.entries(MARKERS_CACHE)
          .map(([key, m]) => {
            const active = activeMarkers.includes(key);
            return `<div class="marker-option ${active ? "active" : ""}"
                 onclick="toggleMarker(${id}, '${key}', ${active}, this.closest('.markers-cell'))">
              <span class="marker-dot" style="background:${m.color}"></span>
              ${m.label}
            </div>`;
          })
          .join("");
        return `<div class="marker-dropdown">${options}</div>`;
      }

      async function toggleMarker(id, marker, isActive, cellEl) {
        const url = `${API}/targets/${id}/markers${isActive ? `/${marker}` : ""}`;
        const res = await fetch(url, {
          method: isActive ? "DELETE" : "POST",
          headers: {
            "x-session": token,
            "Content-Type": "application/json",
          },
          body: isActive ? undefined : JSON.stringify({ marker }),
        });
        const data = await res.json();

        if (!data.ok) {
          showAlert(data.error || "Ошибка");
          return;
        }

        const tr = cellEl.closest("tr");
        const currentMarkers = [
          ...cellEl.querySelectorAll(".marker-dot[data-marker]"),
        ].map((d) => d.dataset.marker);

        const newMarkers = isActive
          ? currentMarkers.filter((m) => m !== marker)
          : [...currentMarkers, marker];

        cellEl.innerHTML = `
  ${markerBadges(newMarkers)}
  <div class="marker-dropdown-anchor">
    <button class="marker-toggle-btn" onclick="this.nextElementSibling.classList.toggle('show')">⋮</button>
    ${markerDropdown(id, newMarkers)}
  </div>
`;

        applyCardStyle(tr, newMarkers);

        const item = ALL_DATA.find((r) => r.id === id);
        if (item) item.markers = newMarkers;
      }

      function renderRows(data) {
        const tbody = document.querySelector("#list tbody");
        tbody.innerHTML = "";

        if (!data || data.length === 0) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
      <td colspan="10" style="text-align:center; justify-content:center; padding:20px; color:#888;">
        Ничего не найдено
      </td>
    `;
          tbody.appendChild(tr);
          return;
        }

        data.forEach((r) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
      <td class="copyable" style="white-space: nowrap;" data-label="ID">${r.id
        .toString()
        .replace(/\B(?=(\d{3})+(?!\d))/g, "&nbsp;")}</td>
      <td class="copyable" data-label="Имя">${r.name || "-"}</td>
      <td class="copyable" data-label="Юзер">${r.username || "-"}</td>
      <td class="copyable" data-label="Чат">${r.chat || "-"}</td>
      <td class="${window.isCleared ? "hidden" : ""}" data-label="Статус">${r.status || "-"}</td>
      <td class="copyable ${window.isCleared ? "hidden" : ""}" data-label="Телефон">${r.phone ? `+${r.phone}` : "-"}</td>
      <td data-label="Страна">${countryFlag(r.country)}</td>
      <td data-label="Добавлен">${r.marked_at?.replace("T", " ").slice(0, 19) || "-"}</td>
      <td data-label="Кто спарсил">${r.parser_user_name || "-"}</td>
      <td data-label="Действия">
        <div class="card-btn-container">
          <button class="action return" onclick="unmark(${r.id}, this)">Вернуть</button>
          <button class="action delete" onclick="del(${r.id}, this)">Удалить</button>
        </div>
        </td>
        <td data-label="Маркеры">
          <div class="markers-cell">
            ${markerBadges(r.markers)}
            <div class="marker-dropdown-anchor">
              <button
                class="marker-toggle-btn"
                onclick="this.nextElementSibling.classList.toggle('show')"
              >
                ⋮
              </button>
              ${markerDropdown(r.id, r.markers)}
            </div>
          </div>
        </td>`;
          applyCardStyle(tr, r.markers);

          tbody.appendChild(tr);
        });
      }

      function sortLocally() {
        const tbody = document.querySelector("#list tbody");
        tbody.innerHTML = "";
        tbody.parentElement.after(loader);

        const anim = lottie.loadAnimation({
          container: loader,
          renderer: "svg",
          loop: true,
          autoplay: true,
          path: "../imgs/loader.json",
        });

        setTimeout(() => {
          anim.destroy();
          loader.remove();

          if (!currentSortMarker) {
            renderRows(ALL_DATA);
            return;
          }

          const sorted = [...ALL_DATA].sort((a, b) => {
            const aHas = (a.markers || []).includes(currentSortMarker) ? 1 : 0;
            const bHas = (b.markers || []).includes(currentSortMarker) ? 1 : 0;
            return bHas - aHas;
          });

          renderRows(sorted);
        }, 300);
      }
      // ===== Загрузка списка =====
      async function load() {
        const tbody = document.querySelector("#list tbody");
        tbody.innerHTML = "";
        tbody.parentElement.after(loader);

        const anim = lottie.loadAnimation({
          container: loader,
          renderer: "svg",
          loop: true,
          autoplay: true,
          path: "../imgs/loader.json",
        });

        await checkAdmin();

        try {
          const res = await fetch(`${API}/my-marks`, {
            headers: { "x-session": token },
          });

          const response = await res.json();

          anim.destroy();
          loader.remove();

          if (response.redirect) window.location.href = response.redirect;

          MARKERS_CACHE = response.markers;
          ALL_DATA = response.data;

          sortLocally();
        } catch (e) {
          anim.destroy();
          console.log(e);
          loader.textContent = "Ошибка загрузки";
        }
      }

      function unmark(id, btn) {
        showConfirm("Вернуть этот ID в общий список?", async () => {
          btn.disabled = true;
          const res = await fetch(`${API}/unmark/${id}`, {
            method: "POST",
            headers: { "x-session": token },
          });
          const data = await res.json();
          if (data.ok) {
            btn.closest("tr").remove();
            ALL_DATA = ALL_DATA.filter((r) => r.id !== id);
          } else {
            showAlert(data.error || "Ошибка");
            btn.disabled = false;
          }
        });
      }

      function del(id, btn) {
        showConfirm("Удалить запись окончательно?", async () => {
          btn.disabled = true;
          const res = await fetch(`${API}/delete/${id}`, {
            method: "DELETE",
            headers: { "x-session": token },
          });
          const data = await res.json();
          if (data.ok) {
            btn.closest("tr").remove();
            ALL_DATA = ALL_DATA.filter((r) => r.id !== id);
          } else {
            showAlert(data.error || "Ошибка");
            btn.disabled = false;
          }
        });
      }

      function back() {
        location.href = "main.html";
      }

      async function checkAdmin() {
        if (!token) return;
        try {
          const res = await fetch(`${API}/me`, {
            headers: { "x-session": token },
          });
          const data = await res.json();

          if (!data.cleared) {
            document
              .querySelectorAll(".status_hidden.hidden")
              .forEach((el) => el.classList.remove("hidden"));
          }

          window.isCleared = data.cleared;
        } catch (e) {
          console.error("Ошибка проверки админа:", e);
        }
      }

      (async () => {
        await load();
        await fillSortOptions();
      })();
    </script>
  </body>
</html>
