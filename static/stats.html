<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="../imgs/logo.png" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Аккаунты | Chocolate Eye</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      header {
        display: flex;
        align-items: center;
        flex-direction: column;
        justify-content: center;
      }

      .status-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 6px;
      }
      .status-free {
        background: #4caf50;
      }
      .status-busy {
        background: #e0c341;
      }
      .status-flood {
        background: #f15757;
      }
      .status-banned {
        background: #9b59b6;
      }

      .status-cell {
        white-space: nowrap;
      }

      .stats-bar {
        display: flex;
        justify-content: center;
        gap: 18px;
        flex-wrap: wrap;
        align-items: center;
        margin: 12px 0 18px;
        font-size: 14px;
      }

      .stats-bar .stat-item {
        display: flex;
        align-items: center;
        gap: 6px;

        font-size: 1.2em;
      }

      .stats-bar .stat-value {
        font-weight: bold;
      }

      .refresh-btn {
        border: none;
        background: #353535;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        padding: 15px 20px !important;
        font-size: 13px;
      }

      .refresh-btn:hover {
        background: #454545;
      }

      tr.row-banned {
        opacity: 0.55;
      }

      /* Запасной адаптив на случай, если .responsive-table в style.css
         не покрывает подписи для новых колонок этой страницы */
      @media (max-width: 640px) {
        #list.responsive-table thead {
          display: none;
        }

        #list.responsive-table,
        #list.responsive-table tbody,
        #list.responsive-table tr,
        #list.responsive-table td {
          display: block;
          width: 100%;
        }

        #list.responsive-table tr {
          margin-bottom: 12px;
        }

        #list.responsive-table td {
          text-align: right;
          padding: 8px 12px;
        }

        #list.responsive-table td[data-label]::before {
          content: attr(data-label);
          float: left;
          font-weight: bold;
          margin-right: 12px;
        }
      }
    </style>
  </head>

  <body>
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-box">
        <p id="modal-message"></p>
        <div class="modal-buttons" id="modal-buttons"></div>
      </div>
    </div>

    <video class="bg-video" muted loop playsinline id="bgVideo">
      <source
        src="https://cdn.iskonentertainment.it.com/sdvg.mp4"
        type="video/mp4"
      />
    </video>

    <div id="overlay" class="hidden block">
      <div id="MarkerLoader"></div>
    </div>

    <div class="header">
      <img class="logo" width="20%" src="../imgs/logo.png" alt="" />
      <h2>Аккаунты парсера</h2>
      <button onclick="location.href = 'main.html'">Назад</button>
    </div>

    <div class="stats-bar" id="stats-bar">
      <span class="stat-item">
        <span class="status-dot status-free"></span>Свободно:
        <span class="stat-value" id="stat-free">—</span>
      </span>
      <span class="stat-item">
        <span class="status-dot status-busy"></span>Занято:
        <span class="stat-value" id="stat-busy">—</span>
      </span>
      <span class="stat-item">
        <span class="status-dot status-flood"></span>Флуд:
        <span class="stat-value" id="stat-flood">—</span>
      </span>
      <span class="stat-item">
        <span class="status-dot status-banned"></span>Забанено:
        <span class="stat-value" id="stat-banned">—</span>
      </span>
      <span class="stat-item">
        Всего: <span class="stat-value" id="stat-total">—</span>
      </span>
    </div>
    <label style="margin-left: 10px">
      <input type="checkbox" id="sort-flood-checkbox" onchange="renderTable()" />
      Сначала короткий флудвейт
    </label>
    <button class="refresh-btn" onclick="load()">Обновить</button>

    <table id="list" class="responsive-table">
      <thead>
        <tr>
          <th>Имя</th>
          <th>Юзер</th>
          <th>Телефон</th>
          <th>Статус</th>
          <th>Освободится через</th>
          <th>Использован последний раз</th>
        </tr>
      </thead>
      <tbody id="accounts-tbody"></tbody>
    </table>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="../js/video.js"></script>

    <script src="../config.js"></script>
    <script>
      const API = window.API_URL;
      const token = localStorage.getItem("session");

      const overlay = document.getElementById("overlay");
      const MarkerLoaderContainer = document.getElementById("MarkerLoader");

      const MarkerLoader = lottie.loadAnimation({
        container: MarkerLoaderContainer,
        renderer: "svg",
        loop: true,
        autoplay: false,
        path: "../imgs/loader.json",
      });

      function showMarkerLoader() {
        overlay.classList.remove("hidden");
        MarkerLoader.play();
      }

      function hideMarkerLoader() {
        overlay.classList.add("hidden");
        MarkerLoader.stop();
      }

      // ===== Модальное окно =====
      function showModal(message, buttons) {
        const overlay = document.getElementById("modal-overlay");
        const msgEl = document.getElementById("modal-message");
        const btnContainer = document.getElementById("modal-buttons");

        msgEl.textContent = message;
        btnContainer.innerHTML = "";

        buttons.forEach((b) => {
          const btn = document.createElement("button");
          btn.textContent = b.label;
          btn.className = b.className || "modal-btn-ok";
          btn.onclick = () => {
            overlay.classList.add("hidden");
            b.onClick?.();
          };
          btnContainer.appendChild(btn);
        });

        overlay.classList.remove("hidden");
      }

      function showAlert(message) {
        showModal(message, [{ label: "Ок", className: "modal-btn-ok" }]);
      }

      async function fetchAccountStats() {
        const res = await fetch(`${API}/accounts/public-stats`, {
          headers: {
            "x-session": token,
            "Content-Type": "application/json",
          },
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      }

      async function fetchAccountList() {
        const res = await fetch(`${API}/accounts/public-list`, {
          headers: {
            "x-session": token,
            "Content-Type": "application/json",
          },
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      }

      function formatDate(str) {
        if (!str) return "никогда";
        return str.slice(0, 19).replace("T", " ");
      }

      function formatFlood(seconds) {
        if (!seconds) return "";
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }

      function renderStatus(acc) {
        if (acc.is_banned) {
          return `<span class="status-dot status-banned"></span>Забанен`;
        }
        if (acc.in_use) {
          return `<span class="status-dot status-busy"></span>Занят`;
        }
        if (acc.flood_seconds_left) {
          return `<span class="status-dot status-flood"></span>Флуд`;
        }
        return `<span class="status-dot status-free"></span>Свободен`;
      }

      let CURRENT_ACCOUNTS = [];

      function renderTable() {
        const sortByFlood = document.getElementById(
          "sort-flood-checkbox",
        ).checked;

        let accounts = [...CURRENT_ACCOUNTS];

        if (sortByFlood) {
          accounts.sort((a, b) => {
            const fa = a.flood_seconds_left ?? Infinity;
            const fb = b.flood_seconds_left ?? Infinity;
            return fa - fb;
          });
        }

        const tbody = document.getElementById("accounts-tbody");
        tbody.innerHTML = "";

        for (const acc of accounts) {
          const tr = document.createElement("tr");
          if (acc.is_banned) tr.classList.add("row-banned");

          tr.innerHTML = `
            <td data-label="Имя">${acc.full_name ?? ""}</td>
            <td data-label="Юзер">${acc.username ?? ""}</td>
            <td data-label="Телефон">${acc.phone}</td>
            <td class="status-cell" data-label="Статус">${renderStatus(acc)}</td>
            <td data-label="Освободится через">${acc.flood_seconds_left ? formatFlood(acc.flood_seconds_left) : "—"}</td>
            <td data-label="Использован последний раз">${formatDate(acc.last_taken_at)}</td>
          `;

          tbody.appendChild(tr);
        }
      }

      async function load() {
        showMarkerLoader();
        try {
          const [stats, listResp] = await Promise.all([
            fetchAccountStats(),
            fetchAccountList(),
          ]);

          document.getElementById("stat-free").textContent = stats.free;
          document.getElementById("stat-busy").textContent = stats.busy;
          document.getElementById("stat-flood").textContent = stats.flood;
          document.getElementById("stat-banned").textContent = stats.banned;
          document.getElementById("stat-total").textContent = stats.total;

          if (listResp.data.redirect) window.location.href = listResp.data.redirect;

          CURRENT_ACCOUNTS = listResp.data;
          renderTable();
        } catch (e) {
          showAlert(`Ошибка загрузки: ${e.message}`);
        } finally {
          hideMarkerLoader();
        }
      }

      load();
    </script>
  </body>
</html>
